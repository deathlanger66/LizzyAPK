name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y git zip unzip libffi-dev libssl-dev zlib1g-dev
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Force SDK license accept
        run: |
          mkdir -p ~/.android
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.android/repositories.cfg
          yes | sdkmanager --licenses || true

      - name: Pin buildozer config
        run: |
          sed -i 's/^requirements =.*/requirements = python3==3.10.11,kivy==2.3.0,requests/' buildozer.spec
          sed -i 's/^android.api =.*/android.api = 33/' buildozer.spec
          sed -i 's/^android.minapi =.*/android.minapi = 24/' buildozer.spec

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lizzy-APK
          path: bin/*.apk
