<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lizzy</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  height:100vh;
  background:radial-gradient(circle at top,#221035,#090911 55%);
  color:#fff;
  font-family:Arial,sans-serif;
  display:flex;
  justify-content:center;
}
.app{
  width:100%;
  max-width:780px;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:rgba(10,10,18,.88);
  border-left:1px solid #2b2140;
  border-right:1px solid #2b2140;
}
header{
  padding:18px;
  background:rgba(18,18,30,.95);
  border-bottom:1px solid #2c2042;
  display:flex;
  align-items:center;
  gap:12px;
}
.avatar{
  width:42px;
  height:42px;
  border-radius:50%;
  background:linear-gradient(135deg,#8b3dff,#ff5bd6);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  box-shadow:0 0 18px #8b3dff88;
}
.title{
  flex:1;
}
.title h1{
  margin:0;
  font-size:24px;
  color:#c27cff;
}
.title p{
  margin:2px 0 0;
  color:#aaa;
  font-size:13px;
}
#chat{
  flex:1;
  overflow-y:auto;
  padding:18px;
}
.msg{
  max-width:82%;
  padding:13px 15px;
  margin:12px 0;
  border-radius:18px;
  line-height:1.45;
  font-size:16px;
  white-space:pre-wrap;
  animation:pop .15s ease;
}
@keyframes pop{
  from{transform:scale(.98);opacity:.4}
  to{transform:scale(1);opacity:1}
}
.user{
  margin-left:auto;
  background:linear-gradient(135deg,#742cff,#9d4dff);
  border-bottom-right-radius:5px;
}
.lizzy{
  margin-right:auto;
  background:#1d1d2b;
  border:1px solid #2d2940;
  border-bottom-left-radius:5px;
}
.lizzy img{
  width:100%;
  border-radius:15px;
  margin-top:10px;
  border:1px solid #3b3155;
}
footer{
  padding:14px;
  display:flex;
  gap:10px;
  background:rgba(18,18,30,.95);
  border-top:1px solid #2c2042;
}
input{
  flex:1;
  padding:14px;
  border:1px solid #34294c;
  border-radius:16px;
  outline:none;
  background:#11111d;
  color:#fff;
  font-size:15px;
}
button{
  width:54px;
  border:0;
  border-radius:16px;
  background:linear-gradient(135deg,#7c35ff,#c546ff);
  color:white;
  font-size:20px;
  font-weight:bold;
  box-shadow:0 0 16px #7c35ff66;
}
.hint{
  text-align:center;
  color:#777;
  font-size:12px;
  padding:6px 10px;
}
</style>
</head>
<body>

<div class="app">
<header>
  <div class="avatar">💜</div>
  <div class="title">
    <h1>Lizzy</h1>
    <p>online • conversa natural</p>
  </div>
</header>

<div id="chat">
  <div class="msg lizzy">Oii 😎</div>
</div>

<div class="hint">Peça qualquer coisa: texto, ideia, pesquisa ou imagem.</div>

<footer>
  <input id="input" placeholder="Mensagem para Lizzy..." onkeydown="if(event.key==='Enter')enviar()">
  <button onclick="enviar()">➤</button>
</footer>
</div>

<script>
let historico = JSON.parse(localStorage.getItem("lizzy_historico") || "[]");

function salvar(){
  localStorage.setItem("lizzy_historico", JSON.stringify(historico));
}

function addMsg(texto, classe, imageUrl=null){
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + classe;
  div.textContent = texto;

  if(imageUrl){
    const img = document.createElement("img");
    img.src = imageUrl;
    div.appendChild(img);
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function enviar(){
  const input = document.getElementById("input");
  const msg = input.value.trim();
  if(!msg) return;

  input.value = "";
  addMsg(msg, "user");

  historico.push({role:"user", content:msg});
  salvar();

  const digitando = addMsg("Digitando...", "lizzy");

  try{
    const r = await fetch("/api/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages:historico.slice(-12)})
    });

    const data = await r.json();

    digitando.textContent = data.reply || "Deu erro.";
    if(data.imageUrl){
      const img = document.createElement("img");
      img.src = data.imageUrl;
      digitando.appendChild(img);
    }

    historico.push({role:"assistant", content:data.reply});
    salvar();

  }catch(e){
    digitando.textContent = "Deu erro. Tenta de novo.";
  }
}
</script>

</body>
  </html>
