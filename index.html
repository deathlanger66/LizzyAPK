<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lizzy IA</title>
<style>
body{margin:0;background:#0b0b10;color:white;font-family:Arial,sans-serif;height:100vh;display:flex;flex-direction:column}
header{padding:16px;text-align:center;background:#151520;color:#b36bff;font-size:24px;font-weight:bold}
#chat{flex:1;padding:15px;overflow-y:auto}
.msg{margin:10px 0;padding:12px;border-radius:12px;max-width:85%;line-height:1.4}
.user{background:#6b2cff;margin-left:auto}
.lizzy{background:#202030;margin-right:auto}
footer{display:flex;padding:10px;background:#151520;gap:8px}
input{flex:1;padding:12px;border-radius:10px;border:0;background:#252535;color:white}
button{padding:12px;border:0;border-radius:10px;background:#8b3dff;color:white;font-weight:bold}
</style>
</head>
<body>

<header>Lizzy 💜</header>
<div id="chat">
  <div class="msg lizzy">Oii, eu sou a Lizzy 😎</div>
</div>

<footer>
  <input id="input" placeholder="Digite sua mensagem...">
  <button onclick="enviar()">Enviar</button>
</footer>

<script>
let historico = [];

function addMsg(texto, classe){
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + classe;
  div.textContent = texto;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function enviar(){
  const input = document.getElementById("input");
  const msg = input.value.trim();
  if(!msg) return;

  input.value = "";
  addMsg(msg, "user");

  historico.push({ role: "user", content: msg });
  const digitando = addMsg("Digitando...", "lizzy");

  try{
    const resposta = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ messages: historico })
    });

    const data = await resposta.json();
    digitando.textContent = data.reply;

    historico.push({ role: "assistant", content: data.reply });
  }catch(e){
    digitando.textContent = "Deu erro. Tenta de novo.";
  }
}
</script>

</body>
</html>
